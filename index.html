<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة كراسات الخط الشاملة - 50 صفحة</title>
    
    <!-- استيراد جميع الخطوط من جوجل -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;700&family=Reem+Kufi:wght@400;700&display=swap');

        /* إجبار المتصفح على طباعة الألوان الباهتة للشف */
        * {
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background-color: #34495e;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* لوحة التحكم العلوية */
        .header-panel {
            background: white;
            padding: 20px 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            width: 90%;
            max-width: 800px;
        }

        .header-panel h1 {
            margin: 0 0 10px 0;
            color: #2c3e50;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
            padding: 10px;
            background: #ecf0f1;
            border-radius: 8px;
        }

        select {
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            border: 2px solid #3498db;
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }

        .btn-download {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(41, 128, 185, 0.4);
        }
        .btn-download:hover { background-color: #1f6391; }

        .instructions { color: #e74c3c; font-weight: bold; margin-top: 15px; font-size: 14px;}

        #pdf-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        /* -------------------------------------
           هندسة ورقة A4 والتقسيمات (Grid)
           ------------------------------------- */
        .a4-paper {
            width: 210mm;
            height: 297mm;
            background-color: white;
            box-sizing: border-box;
            padding: 15mm; 
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            page-break-after: always;
            overflow: hidden;
            flex-shrink: 0;
        }

        .grid-4-quarters {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr;    
            column-gap: 15mm; 
            row-gap: 10mm;    
            height: 100%;
        }

        .grid-2-columns {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            column-gap: 15mm;
            height: 100%;
        }

        .practice-block {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        /* -------------------------------------
           إعدادات السطر وإدارة الخطوط المتغيرة
           ------------------------------------- */
        .line-row {
            height: 1.8cm; 
            line-height: 1.6cm; /* لضبط تمركز الخطوط المختلفة */
            border-bottom: 1.5px solid #bdc3c7; 
            white-space: nowrap;
            overflow: hidden; 
            padding-right: 5px;
            box-sizing: border-box;
        }

        /* الألوان */
        .master { color: #000; font-weight: bold; }
        .trace { color: #d1d8e0; }
        .empty { color: transparent; border-bottom: 1.5px dashed #bdc3c7; } 

        /* 
           برمجة تغير الخطوط (يتم تفعيلها عبر تغيير الـ Class)
        */
        /* 1. خط الرقعة */
        #pdf-container.font-ruqaa .line-row { 
            font-family: 'Aref Ruqaa', serif; font-size: 26px; 
        }
        /* 2. خط النسخ الكلاسيكي */
        #pdf-container.font-naskh .line-row { 
            font-family: 'Amiri', serif; font-size: 24px; 
        }
        /* 3. خط النسخ المدرسي الواضح */
        #pdf-container.font-noto .line-row { 
            font-family: 'Noto Naskh Arabic', serif; font-size: 22px; 
        }
        /* 4. الخط الكوفي */
        #pdf-container.font-kufi .line-row { 
            font-family: 'Reem Kufi', sans-serif; font-size: 20px; 
        }

        /* ضبط حجم اللغة الكردية لتناسب الخطوط */
        [lang="ku"] .line-row {
            padding-right: 15px;
        }

        /* الطباعة الأصلية */
        @page { size: A4 portrait; margin: 0; }
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .header-panel { display: none !important; }
            #pdf-container { gap: 0; display: block; }
            .a4-paper { box-shadow: none; margin: 0; border: none; }
        }
    </style>
</head>
<body>

    <div class="header-panel">
        <h1>كراسة الخط العربي الشاملة (50 صفحة)</h1>
        
        <div class="controls">
            <label for="fontSelector"><strong>اختر نوع الخط:</strong></label>
            <select id="fontSelector" onchange="changeFont()">
                <option value="font-ruqaa">خط الرقعة (للكتابة اليومية السريعة)</option>
                <option value="font-naskh">خط النسخ الأصيل (لكتابة الكتب والقرآن)</option>
                <option value="font-noto">النسخ المدرسي (للمبتدئين بخط واضح)</option>
                <option value="font-kufi">الخط الكوفي (للكتابة الهندسية)</option>
            </select>
            <button class="btn-download" onclick="window.print()">📥 حفظ / طباعة الكراسة (PDF)</button>
        </div>
        
        <div class="instructions">⚠️ ملاحظة: عند حفظ الـ PDF سيتم حفظ الكراسة بنوع الخط الذي اخترته من القائمة.</div>
    </div>

    <!-- حاوية الصفحات (هنا نضع كلاس الخط الافتراضي) -->
    <div id="pdf-container" class="font-ruqaa">
        <!-- توليد الصفحات برمجياً -->
    </div>

    <script>
        // دالة تغيير الخط عند اختيار المستخدم من القائمة
        function changeFont() {
            const selectedFont = document.getElementById('fontSelector').value;
            const container = document.getElementById('pdf-container');
            // استبدال الكلاس الخاص بالحاوية ليتم تطبيق نوع الخط على الـ 50 صفحة
            container.className = selectedFont;
        }

        // --- البيانات الأساسية ---
        const baseArabicSingle = [
            "ا ل ك ط ظ", "ب ت ث ف", "ج ح خ", "د ذ ر ز", "س ش ص ض", "ع غ ق ف", "م ن هـ و ي", "لا ـلا", "أب أخ أم", "جد عم خال",
            "باب بيت نور", "قمر شمس نجم", "سيف رمح قوس", "علم عمل أمل", "صدق صبر شكر", "قلب عقل روح", "بحر نهر موج", "ورد زهر شجر", "أسد فهد نمر", "صقر نسر طير",
            "ماء هواء نار", "أرض سماء غيم", "ليل نهار فجر", "كتاب دفتر قلم", "مدرسة جامعة", "طبيب مهندس", "وطن أمان سلام", "صدق وفاء", "العلم نور", "الجهل ظلام",
            "الوقت كالسيف", "من جد وجد", "من زرع حصد", "العقل السليم", "الجسم السليم", "الكلمة الطيبة", "خير الكلام", "احترام الكبير", "الصبر مفتاح", "النظافة إيمان",
            "الكلمة صدقة", "احترام واجب", "العطف عالصغير", "بر الوالدين", "القناعة كنز", "الصديق وقت الضيق", "في التأني السلامة", "العجلة الندامة", "يد لا تصفق", "الجار قبل الدار",
            "الرفيق قبل الطريق", "الأفعال أبلغ", "عامل كما تحب", "العلم يبني", "الجهل يهدم", "من طلب العلا", "خير جليس كتاب", "وما نيل المطالب", "تؤخذ غلابا", "نهاية الدروس"
        ];

        const baseArabicDouble = [
            ["دقات قلب المرء قائلة", "إن الحياة دقائق وثواني"], ["وما نيل المطالب بالتمني", "ولكن تؤخذ الدنيا غلابا"],
            ["أنا لغة الأعراب من فطروا", "على الفصاحة من نبعي"], ["السيف أصدق أنباء من الكتب", "في حده الحد بين الجد"],
            ["الخيل والليل والبيداء", "والسيف والرمح والقرطاس"], ["ألا ليت الشباب يعود يوماً", "فأخبره بما فعل المشيب"],
            ["لا تحسبن المجد تمراً آكله", "لن تبلغ المجد حتى تلعق"], ["إذا الشعب يوماً أراد الحياة", "فلا بد أن يستجيب القدر"],
            ["الأم مدرسة إذا أعددتها", "أعددت شعباً طيب الأعراق"], ["ومن هاب أسباب المنايا", "وإن يرق أسباب السماء"]
        ];

        const baseKurdishSingle = [
            "ئـ ب پ ت ج چ", "ح خ د ر ڕ ز ژ", "س ش ع غ ف ڤ", "ق ک گ ل ڵ م", "ن هـ ە و ۆ ی ێ", 
            "دار، مار، کار، بار", "دەست، چاو، گوێ", "خۆزگە، هیوا، ژیان", "هەولێر، سلێمانی", "دهۆک، هەڵەبجە",
            "کوردستان نیشتمانمە", "زمانی کوردی", "پێشمەرگە پارێزەرە", "کتێب باشترین هاوڕێیە", "زانست ڕووناکیە", 
            "قسەی هەق تاڵە", "دڵۆپ دڵۆپ گۆمە", "بەرد سەنگینە", "دار دەچەمێتەوە", "کەس ناڵێت ترشە"
        ];

        // مضاعفة البيانات لتغطية 50 صفحة
        const arabicSingle120 = [...baseArabicSingle, ...baseArabicSingle]; 
        const arabicDouble20 = [...baseArabicDouble, ...baseArabicDouble];
        const kurdishSingle40 = [...baseKurdishSingle, ...baseKurdishSingle];

        const container = document.getElementById('pdf-container');
        let htmlContent = '';

        // دوال البناء
        function generateQuarterBlock(text) {
            let block = `<div class="practice-block">`;
            block += `<div class="line-row master">${text}</div>`;
            for(let i=0; i<4; i++) block += `<div class="line-row trace">${text}</div>`;
            for(let i=0; i<2; i++) block += `<div class="line-row empty"></div>`;
            block += `</div>`;
            return block;
        }

        function generateFullColumnBlock(line1, line2) {
            let block = `<div class="practice-block">`;
            block += `<div class="line-row master">${line1}</div>`;
            block += `<div class="line-row master">${line2}</div>`;
            for(let i=0; i<4; i++) {
                block += `<div class="line-row trace">${line1}</div>`;
                block += `<div class="line-row trace">${line2}</div>`;
            }
            for(let i=0; i<2; i++) {
                block += `<div class="line-row empty"></div>`;
                block += `<div class="line-row empty"></div>`;
            }
            block += `</div>`;
            return block;
        }

        // أ) 30 صفحة عربي
        for(let i=0; i < arabicSingle120.length; i+=4) {
            htmlContent += `
            <div class="a4-paper">
                <div class="grid-4-quarters">
                    ${generateQuarterBlock(arabicSingle120[i])}
                    ${generateQuarterBlock(arabicSingle120[i+1])}
                    ${generateQuarterBlock(arabicSingle120[i+2])}
                    ${generateQuarterBlock(arabicSingle120[i+3])}
                </div>
            </div>`;
        }

        // ب) 10 صفحات شعر عربي
        for(let i=0; i < arabicDouble20.length; i+=2) {
            htmlContent += `
            <div class="a4-paper">
                <div class="grid-2-columns">
                    ${generateFullColumnBlock(arabicDouble20[i][0], arabicDouble20[i][1])}
                    ${generateFullColumnBlock(arabicDouble20[i+1][0], arabicDouble20[i+1][1])}
                </div>
            </div>`;
        }

        // ج) 10 صفحات كردي
        for(let i=0; i < kurdishSingle40.length; i+=4) {
            htmlContent += `
            <div class="a4-paper" lang="ku">
                <div class="grid-4-quarters">
                    ${generateQuarterBlock(kurdishSingle40[i])}
                    ${generateQuarterBlock(kurdishSingle40[i+1])}
                    ${generateQuarterBlock(kurdishSingle40[i+2])}
                    ${generateQuarterBlock(kurdishSingle40[i+3])}
                </div>
            </div>`;
        }

        // حقن الصفحات
        container.innerHTML = htmlContent;

    </script>
</body>
</html>
