<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كراسة الخط - النظام الأفقي (6 مربعات)</title>
    
    <!-- استيراد جميع الخطوط -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;700&family=Reem+Kufi:wght@400;700&display=swap');

        /* إجبار المتصفح على طباعة الألوان بدقة */
        * {
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background-color: #2c3e50;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-panel {
            background: white;
            padding: 20px 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            width: 90%;
            max-width: 900px;
        }

        .header-panel h1 { margin: 0 0 10px 0; color: #2c3e50; }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
            padding: 15px;
            background: #ecf0f1;
            border-radius: 8px;
        }

        select, .btn-download {
            padding: 12px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
        }

        select { border: 2px solid #e67e22; outline: none; }
        
        .btn-download {
            background-color: #e67e22;
            color: white;
            border: none;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(230, 126, 34, 0.4);
        }
        .btn-download:hover { background-color: #d35400; }

        .instructions { color: #c0392b; font-weight: bold; margin-top: 15px; }

        #pdf-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        /* -------------------------------------
           هندسة الورقة: A4 بالعرض (Landscape)
           المقاسات مقلوبة: العرض 297 والطول 210
           ------------------------------------- */
        .a4-paper-landscape {
            width: 297mm;
            height: 210mm;
            background-color: white;
            box-sizing: border-box;
            padding: 12mm 15mm; /* هوامش متوازنة */
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            page-break-after: always;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* شبكة من 6 مربعات (3 أعمدة × صفين) */
        .grid-6-blocks {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* يمين، وسط، يسار */
            grid-template-rows: 1fr 1fr;        /* أعلى، أسفل */
            column-gap: 12mm; /* مسافة بين الأعمدة */
            row-gap: 8mm;     /* مسافة بين الصفوف */
            height: 100%;
        }

        .practice-block {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        /* إعدادات السطر الواحد (تم تصغير الارتفاع قليلاً ليتسع في الورقة الأفقية) */
        .line-row {
            height: 1.3cm; 
            line-height: 1.1cm;
            border-bottom: 1.5px solid #a4b0be; 
            white-space: nowrap;
            overflow: hidden; 
            padding-right: 5px;
            box-sizing: border-box;
        }

        /* الألوان وأنواع الأسطر */
        .master { color: #000; font-weight: bold; }
        .trace { color: #d1d8e0; }
        .empty { color: transparent; border-bottom: 1.5px dashed #a4b0be; } 

        /* أحجام الخطوط (عادت كبيرة بفضل الورقة الأفقية) */
        #pdf-container.font-ruqaa .line-row { font-family: 'Aref Ruqaa', serif; font-size: 32px; }
        #pdf-container.font-naskh .line-row { font-family: 'Amiri', serif; font-size: 28px; }
        #pdf-container.font-noto .line-row { font-family: 'Noto Naskh Arabic', serif; font-size: 24px; }
        #pdf-container.font-kufi .line-row { font-family: 'Reem Kufi', sans-serif; font-size: 22px; }

        /* الطباعة الأصلية (تم إخبار المتصفح أن يطبع بالعرض Landscape) */
        @page { size: A4 landscape; margin: 0; }
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .header-panel { display: none !important; }
            #pdf-container { gap: 0; display: block; }
            .a4-paper-landscape { box-shadow: none; margin: 0; border: none; }
        }
    </style>
</head>
<body>

    <div class="header-panel">
        <h1>كراسة الخط - النظام الأفقي (6 مربعات للصفحة)</h1>
        <p>الورقة مقسمة إلى: (يمين، وسط، يسار) مع الحفاظ على حجم الخط الكبير والمريح</p>
        
        <div class="controls">
            <label for="fontSelector"><strong>اختر نوع الخط:</strong></label>
            <select id="fontSelector" onchange="changeFont()">
                <option value="font-ruqaa">خط الرقعة (للكتابة اليومية)</option>
                <option value="font-naskh">خط النسخ الأصيل (للقرآن والكتب)</option>
                <option value="font-noto">النسخ المدرسي (واضح للمبتدئين)</option>
                <option value="font-kufi">الخط الكوفي (هندسي)</option>
            </select>
            <button class="btn-download" onclick="window.print()">📥 حفظ الكراسة (PDF بالعرض)</button>
        </div>
        
        <div class="instructions">⚠️ ملاحظة: عند حفظ الـ PDF، ستكون الصفحات بالعرض (Landscape) تلقائياً لتتسع للـ 6 مربعات.</div>
    </div>

    <!-- حاوية الصفحات الـ 50 -->
    <div id="pdf-container" class="font-ruqaa">
        <!-- سيتم التوليد هنا -->
    </div>

    <script>
        function changeFont() {
            document.getElementById('pdf-container').className = document.getElementById('fontSelector').value;
        }

        // --- 1. البيانات الأساسية ---
        const baseArabicSingle = [
            "ا ل ك ط ظ", "ب ت ث ف", "ج ح خ", "د ذ ر ز", "س ش ص ض", "ع غ ق ف", "م ن هـ و ي", "لا ـلا", "أب أخ أم", "جد عم خال",
            "باب بيت نور", "قمر شمس نجم", "سيف رمح قوس", "علم عمل أمل", "صدق صبر شكر", "قلب عقل روح", "بحر نهر موج", "ورد زهر شجر", "أسد فهد نمر", "صقر نسر طير",
            "ماء هواء نار", "أرض سماء غيم", "ليل نهار فجر", "كتاب دفتر قلم", "مدرسة جامعة", "طبيب مهندس", "وطن أمان سلام", "صدق وفاء", "العلم نور", "الجهل ظلام"
        ];

        // الشعر (سيتم فرده كأشطر منفصلة ليتناسب مع المربعات الـ 6)
        const basePoetry = [
            "دقات قلب المرء قائلة", "إن الحياة دقائق وثواني",
            "وما نيل المطالب بالتمني", "ولكن تؤخذ الدنيا غلابا",
            "أنا لغة الأعراب من فطروا", "على الفصاحة من نبعي",
            "السيف أصدق أنباء من الكتب", "في حده الحد بين الجد",
            "الخيل والليل والبيداء", "والسيف والرمح والقرطاس",
            "ألا ليت الشباب يعود يوماً", "فأخبره بما فعل المشيب",
            "لا تحسبن المجد تمراً آكله", "لن تبلغ المجد حتى تلعق",
            "إذا الشعب يوماً أراد الحياة", "فلا بد أن يستجيب القدر",
            "الأم مدرسة إذا أعددتها", "أعددت شعباً طيب الأعراق",
            "ومن هاب أسباب المنايا", "وإن يرق أسباب السماء"
        ];

        const baseKurdishSingle = [
            "ئـ ب پ ت ج چ", "ح خ د ر ڕ ز ژ", "س ش ع غ ف ڤ", "ق ک گ ل ڵ م", "ن هـ ە و ۆ ی ێ", 
            "دار، مار، کار، بار", "دەست، چاو، گوێ", "خۆزگە، هیوا، ژیان", "هەولێر، سلێمانی", "دهۆک، هەڵەبجە",
            "کوردستان نیشتمانمە", "زمانی کوردی", "پێشمەرگە پارێزەرە", "کتێب باشترین هاوڕێیە", "زانست ڕووناکیە", 
            "قسەی هەق تاڵە", "دڵۆپ دڵۆپ گۆمە", "بەرد سەنگینە", "دار دەچەمێتەوە", "کەس ناڵێت ترشە"
        ];

        // --- 2. تجهيز الكمية المطلوبة لـ 50 صفحة (كل صفحة تأخذ 6 مربعات) ---
        
        // 30 صفحة عربي = 180 مربع
        let arabic180 = [];
        while(arabic180.length < 180) { arabic180 = arabic180.concat(baseArabicSingle); }
        arabic180 = arabic180.slice(0, 180);

        // 10 صفحات شعر = 60 مربع
        let poetry60 = [];
        while(poetry60.length < 60) { poetry60 = poetry60.concat(basePoetry); }
        poetry60 = poetry60.slice(0, 60);

        // 10 صفحات كردي = 60 مربع
        let kurdish60 = [];
        while(kurdish60.length < 60) { kurdish60 = kurdish60.concat(baseKurdishSingle); }
        kurdish60 = kurdish60.slice(0, 60);

        // --- 3. دالة بناء المربع الواحد (7 أسطر) ---
        function generateBlock(text) {
            let block = `<div class="practice-block">`;
            block += `<div class="line-row master">${text}</div>`;
            for(let i=0; i<4; i++) block += `<div class="line-row trace">${text}</div>`;
            for(let i=0; i<2; i++) block += `<div class="line-row empty"></div>`;
            block += `</div>`;
            return block;
        }

        // --- 4. التجميع ووضعها في الصفحات الأفقية ---
        const container = document.getElementById('pdf-container');
        let htmlContent = '';

        // دالة مساعدة لإنشاء صفحة بـ 6 مربعات
        function createPage(dataArray, startIndex, lang = "ar") {
            return `
            <div class="a4-paper-landscape" ${lang === 'ku' ? 'lang="ku"' : ''}>
                <div class="grid-6-blocks">
                    ${generateBlock(dataArray[startIndex])}     <!-- أعلى اليمين -->
                    ${generateBlock(dataArray[startIndex+1])}   <!-- أعلى الوسط -->
                    ${generateBlock(dataArray[startIndex+2])}   <!-- أعلى اليسار -->
                    ${generateBlock(dataArray[startIndex+3])}   <!-- أسفل اليمين -->
                    ${generateBlock(dataArray[startIndex+4])}   <!-- أسفل الوسط -->
                    ${generateBlock(dataArray[startIndex+5])}   <!-- أسفل اليسار -->
                </div>
            </div>`;
        }

        // أ) 30 صفحة عربي (180 مربع)
        for(let i=0; i < arabic180.length; i+=6) {
            htmlContent += createPage(arabic180, i);
        }

        // ب) 10 صفحات شعر (60 مربع)
        for(let i=0; i < poetry60.length; i+=6) {
            htmlContent += createPage(poetry60, i);
        }

        // ج) 10 صفحات كردي (60 مربع)
        for(let i=0; i < kurdish60.length; i+=6) {
            htmlContent += createPage(kurdish60, i, "ku");
        }

        // وضع المحتوى في الصفحة
        container.innerHTML = htmlContent;

    </script>
</body>
</html>
