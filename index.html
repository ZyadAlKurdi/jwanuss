<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دفتر الخط الشامل - كلمات وجمل</title>
    
    <!-- استيراد الخطوط -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;700&family=Reem+Kufi:wght@400;700&display=swap');

        * {
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background-color: #1e272e;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* لوحة التحكم */
        .header-panel {
            background: #ffffff;
            padding: 20px 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            width: 95%;
            max-width: 900px;
            border-bottom: 5px solid #0984e3;
        }

        .header-panel h1 {
            margin: 0 0 15px 0;
            color: #2c3e50;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            background: #f1f2f6;
            padding: 15px;
            border-radius: 8px;
        }

        select, .btn-download {
            padding: 10px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            border: 2px solid #0984e3;
            cursor: pointer;
            outline: none;
        }

        .btn-download {
            background-color: #00b894;
            color: white;
            border: none;
            transition: 0.3s;
        }
        .btn-download:hover { background-color: #00a885; }

        /* -------------------------------------
           تصميم الدفتر (لا يوجد إطارات)
           ------------------------------------- */
        #pdf-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            align-items: center;
        }

        .a4-paper {
            width: 210mm;
            height: 297mm;
            background-color: white;
            padding: 12mm 15mm; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            page-break-after: always;
            flex-shrink: 0;
            
            /* تقسيم الورقة لـ 4 مربعات وهمية (2 يمين، 2 يسار) */
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            column-gap: 15mm; 
        }

        .quadrant {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        /* -------------------------------------
           تصميم السطور المدرسية
           ------------------------------------- */
        .notebook-line {
            position: relative;
            width: 100%;
            height: 1.1cm; 
            display: flex;
            align-items: flex-end; 
            margin-bottom: 2px;
            white-space: nowrap;
        }

        /* تنسيق لتوزيع الكلمات المتكررة */
        .line-words { justify-content: space-between; }
        
        /* تنسيق لمركزة الجمل المفيدة لتملأ السطر */
        .line-sentence { justify-content: center; }

        /* سطر الارتكاز لحماية الحروف (ح، ێ، ڵ، ي) */
        .notebook-line::after {
            content: '';
            position: absolute;
            bottom: 6px; 
            left: 0;
            right: 0;
            height: 1.5px;
            background-color: #a4b0be; /* لون سطر الدفتر */
            z-index: 1;
        }

        .text-span {
            padding-bottom: 6px; 
            line-height: 1;
            z-index: 2;
        }

        /* -------------------------------------
           ألوان الخطوط
           ------------------------------------- */
        .text-master { color: #000000; font-weight: bold; }
        
        /* مفرغ (إطار خارجي للتلوين) */
        .text-trace { 
            color: transparent; 
            -webkit-text-stroke: 1px #b2bec3; 
        }

        /* مظلل (رمادي) */
        .text-shadow { color: #b2bec3; }

        /* سطر فارغ مخفي تماماً لكن يحفظ المساحة */
        .text-empty { visibility: hidden; }

        /* ضبط أحجام الخطوط (للجمل تكون أصغر قليلاً لتتسع في العمود) */
        #pdf-container.font-ruqaa .text-span { font-family: 'Aref Ruqaa', serif; font-size: 26px; }
        #pdf-container.font-naskh .text-span { font-family: 'Amiri', serif; font-size: 22px; }
        #pdf-container.font-noto .text-span { font-family: 'Noto Naskh Arabic', serif; font-size: 20px; }
        #pdf-container.font-kufi .text-span { font-family: 'Reem Kufi', sans-serif; font-size: 19px; padding-bottom: 10px;}

        @media print {
            body { background: white; padding: 0; margin: 0; }
            .header-panel { display: none !important; }
            #pdf-container { gap: 0; }
            .a4-paper { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

    <div class="header-panel">
        <h1>كراسة الخط خۆشنووسی </h1>
        
        <div class="controls">
            <select id="fontSelector" onchange="updateSettings()">
                <option value="font-ruqaa">خط الرقعة</option>
                <option value="font-naskh">خط النسخ</option>
                <option value="font-noto">النسخ المدرسي</option>
                <option value="font-kufi">الخط الكوفي</option>
            </select>

            <select id="traceSelector" onchange="updateSettings()">
                <option value="text-trace">مفرغ نێو بەتاڵ</option>
                <option value="text-shadow">مظلل  سێبەر کاڵ کراو</option>
            </select>

            <button class="btn-download" onclick="window.print()">📥 حفظ سەیڤ/ طباعة چاپ (PDF)</button>
        </div>
    </div>

    <!-- حاوية الدفتر -->
    <div id="pdf-container" class="font-ruqaa"></div>

    <script>
        function updateSettings() {
            const font = document.getElementById('fontSelector').value;
            const traceStyle = document.getElementById('traceSelector').value;
            
            document.getElementById('pdf-container').className = font;

            const traceElements = document.querySelectorAll('.dynamic-trace');
            traceElements.forEach(el => {
                // إزالة الكلاسات القديمة المتعلقة باللون
                el.classList.remove('text-trace', 'text-shadow');
                // إضافة الكلاس الجديد
                el.classList.add(traceStyle);
            });
        }

        // ==========================================
        // 1. قواعد البيانات (كلمات وجمل مفيدة)
        // ==========================================

        // جمل عربية مفيدة (تأخذ السطر بالكامل)
        const arabicSentences = [
            "العلم يبني بيوتاً لا عماد لها", "القناعة كنز عظيم لا يفنى", 
            "الصبر مفتاح لكل فرج قريب", "العقل السليم في الجسم السليم",
            "بر الوالدين طريق إلى الجنة", "خير جليس في الزمان كتاب",
            "من جد وجد ومن زرع حصد", "الوقت كالسيف إن لم تقطعه قطعك",
            "الكلمة الطيبة صدقة تؤجر عليها", "النظافة من الإيمان فاحرص عليها",
            "الصدق ينجي والكذب يهوي", "احترام المعلم واجب على كل طالب",
            "العطف على الصغير من شيم الكرام", "الجار قبل الدار والرفيق قبل الطريق",
            "بالعلم والعمل ترتقي الأمم", "الوطن غالي ويجب الدفاع عنه"
        ];

        // كلمات عربية قصيرة (يتم تكرارها لملء الفراغ)
        const arabicWords = [
            "مدرسة", "جامعة", "طبيب", "مهندس", "كتاب", "دفتر", "قلم", "علم", "نور",
            "قمر", "شمس", "نجم", "سماء", "أرض", "بحر", "نهر", "جبل", "شجر", "ورد",
            "صدق", "صبر", "شكر", "أمل", "عمل", "عقل", "قلب", "روح", "وطن", "سلام"
        ];

        // جمل كردية مفيدة (تأخذ السطر بالكامل)
        const kurdishSentences = [
            "زانست ڕووناکیە و نەزانی تاریکیە", "پەرتووک باشترین هاوڕێی مرۆڤە",
            "ڕێزی دایک و باوک ئەرکێکی گەورەیە", "ژینگە بپارێزە بۆ ژیانێکی تەندروست",
            "کات وەک زێڕ وایە بیپارێزە", "زمانی دایک ناسنامەی نەتەوەیە",
            "بە هەوڵدان دەگەیتە هەموو ئامانجێک", "کوردستان نیشتمانی جوان و شیرینمە",
            "پەروەردە و فێرکردن بناغەی پێشکەوتنە", "مامۆستا چرای ڕووناککەرەوەی ڕێگامانە",
            "ئاو سەرچاوەی ژیانە بیپارێزە", "نیشتمانپەروەری نیشانەی ئیمانە"
        ];

        // كلمات كردية قصيرة (يتم تكرارها لملء الفراغ)
        const kurdishWords = [
            "زانست", "کتێب", "قەڵەم", "دەفتەر", "قوتابی", "خوێندنگە", "مامۆستا",
            "خۆر", "مانگ", "هەور", "باران", "بەفر", "چیا", "ڕووبار", "دەشت",
            "ئاشتی", "ئازادی", "هیوا", "خۆزگە", "ژیان", "دڵ", "گوڵ", "نیشتمان"
        ];

        // ==========================================
        // 2. دوال مساعدة لبناء السطور
        // ==========================================

        // دالة إنشاء المحتوى (إما جملة تملأ السطر، أو كلمة تتكرر 4 مرات)
        function getContentSpans(text, isSentence) {
            if (isSentence) {
                // الجملة تنزل مرة واحدة وتتمركز
                return `<span class="text-span">${text}</span>`;
            } else {
                // الكلمة القصيرة تتكرر 4 مرات لتملأ السطر تماماً
                let spans = '';
                for(let i=0; i<4; i++) {
                    spans += `<span class="text-span">${text}</span>`;
                }
                return spans;
            }
        }

        // دالة توليد مجموعة تمرين (سطر أصلي + 4 منقط + سطر فارغ)
        function generateExercise(text, isSentence, traceStyle) {
            const spans = getContentSpans(text, isSentence);
            const lineClass = isSentence ? "line-sentence" : "line-words";
            
            return `
                <div class="notebook-line ${lineClass} text-master">${spans}</div>
                <div class="notebook-line ${lineClass} dynamic-trace ${traceStyle}">${spans}</div>
                <div class="notebook-line ${lineClass} dynamic-trace ${traceStyle}">${spans}</div>
                <div class="notebook-line ${lineClass} dynamic-trace ${traceStyle}">${spans}</div>
                <div class="notebook-line ${lineClass} dynamic-trace ${traceStyle}">${spans}</div>
                <div class="notebook-line ${lineClass} text-empty">${spans}</div>
            `;
        }

        // ==========================================
        // 3. بناء صفحات الدفتر
        // ==========================================
        
        const container = document.getElementById('pdf-container');
        let htmlContent = '';

        // إنشاء 50 صفحة
        // الصفحة = 8 تمارين (2 في كل قسم من الأقسام الأربعة)
        for (let page = 1; page <= 50; page++) {
            
            let isSentence = false;
            let currentList = [];
            let isKurdish = false;

            // تحديد المحتوى بناءً على رقم الصفحة
            if (page <= 15) {
                // الصفحات 1 إلى 15: جمل عربية
                currentList = arabicSentences;
                isSentence = true;
            } 
            else if (page <= 25) {
                // الصفحات 16 إلى 25: كلمات عربية (متكررة)
                currentList = arabicWords;
                isSentence = false;
            } 
            else if (page <= 35) {
                // الصفحات 26 إلى 35: جمل كردية
                currentList = kurdishSentences;
                isSentence = true;
                isKurdish = true;
            } 
            else {
                // الصفحات 36 إلى 50: كلمات كردية (متكررة)
                currentList = kurdishWords;
                isSentence = false;
                isKurdish = true;
            }

            const langAttr = isKurdish ? 'lang="ku"' : '';
            htmlContent += `<div class="a4-paper" ${langAttr}>`;

            // تقسيم الورقة لـ 4 مربعات (يمين ويسار / أعلى وأسفل)
            for(let quadrant = 0; quadrant < 4; quadrant++) {
                htmlContent += `<div class="quadrant">`;
                
                // كل ربع (مربع) فيه تمرينين (كلمتين أو جملتين مختلفتين)
                for(let ex = 0; ex < 2; ex++) {
                    // اختيار جملة أو كلمة عشوائية من القائمة المحددة للصفحة
                    const randomIndex = Math.floor(Math.random() * currentList.length);
                    const text = currentList[randomIndex];
                    
                    // الحالة الافتراضية للتتبع عند التحميل
                    htmlContent += generateExercise(text, isSentence, 'text-trace');
                }
                
                htmlContent += `</div>`; 
            }

            htmlContent += `</div>`; 
        }

        container.innerHTML = htmlContent;

        // تطبيق الإعدادات عند بدء التشغيل
        updateSettings();

    </script>
</body>
</html>
